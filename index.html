// --- Next Shift Card ---
function parseTimeToMins(timeStr) {
  // Converts "13:48" or "00:25+1" to minutes since midnight
  // +1 means next day, add 24*60
  if (!timeStr) return null;
  const nextDay = timeStr.includes('+1');
  const clean = timeStr.replace('+1', '').trim();
  const [h, m] = clean.split(':').map(Number);
  return h * 60 + m + (nextDay ? 24 * 60 : 0);
}

function getShiftTimingForDate(date) {
  // Returns { hasShift, isRelief, signOnMins, signOffMins, dutyNum, posType, workH, workM, duty }
  const shift = getShiftForDate(date);
  if (shift.kind === 'work' && shift.duty) {
    const signOnMins = parseTimeToMins(shift.duty.on);
    const signOffMins = parseTimeToMins(shift.duty.off);
    return {
      hasShift: true, isRelief: false,
      signOnMins, signOffMins,
      dutyNum: shift.dutyNum,
      posType: shift.posType,
      workH: shift.workH, workM: shift.workM,
      duty: shift.duty,
    };
  }
  if (shift.kind === 'off') {
    const oKind = offKind(shift.posType);
    if (!shift.overridden && (oKind === 'relief' || oKind === 'dummy')) {
      return { hasShift: false, isRelief: true };
    }
    return { hasShift: false, isRelief: false };
  }
  return { hasShift: false, isRelief: false };
}

function formatCountdown(totalMins) {
  const h = Math.floor(Math.abs(totalMins) / 60);
  const m = Math.abs(totalMins) % 60;
  if (h === 0) return `${m}m`;
  if (m === 0) return `${h}h`;
  return `${h}h ${m}m`;
}

function renderNextShift() {
  const card = document.getElementById('next-shift-card');
  if (!card) return;

  const now = new Date();
  const nowMins = now.getHours() * 60 + now.getMinutes();
  const todayISO = fmtISO(now);

  // Look ahead up to 14 days
  let targetDate = null;
  let targetTiming = null;
  let daysAhead = 0;
  let state_label = 'future'; // on-shift | today | tomorrow | future | relief | off

  // First check today
  const todayTiming = getShiftTimingForDate(now);

  if (todayTiming.hasShift) {
    const { signOnMins, signOffMins } = todayTiming;
    // Are we currently on shift?
    // Handle overnight: if signOff > 24*60 it spills into tomorrow
    if (nowMins >= signOnMins && nowMins < signOffMins) {
      // Currently on shift
      targetDate = now;
      targetTiming = todayTiming;
      state_label = 'on-shift';
    } else if (nowMins < signOnMins) {
      // Shift hasn't started yet today
      targetDate = now;
      targetTiming = todayTiming;
      state_label = 'today';
    }
    // else shift already finished today — fall through to look ahead
  }

  // If not found yet, look forward
  if (!targetDate) {
    for (let i = 1; i <= 14; i++) {
      const d = addDays(now, i);
      const timing = getShiftTimingForDate(d);
      if (timing.hasShift) {
        targetDate = d;
        targetTiming = timing;
        daysAhead = i;
        state_label = i === 1 ? 'tomorrow' : 'future';
        break;
      }
      if (timing.isRelief && !targetDate) {
        // Mark as relief but keep looking in case there's a filled duty later
        targetDate = d;
        targetTiming = timing;
        daysAhead = i;
        state_label = 'relief';
      }
    }
  }

  if (!targetDate) {
    card.innerHTML = '';
    return;
  }

  const duty = targetTiming.duty;
  const signOnDisplay = duty ? duty.on : '—';
  const signOffDisplay = duty ? duty.off.replace('+1', ' +1') : '—';

  // Build countdown string
  let countdownHTML = '';
  if (state_label === 'on-shift' && duty) {
    const minsLeft = targetTiming.signOffMins - nowMins;
    countdownHTML = `<span class="ns-countdown">${formatCountdown(minsLeft)} left</span>`;
  } else if (state_label === 'today' && duty) {
    const minsUntil = targetTiming.signOnMins - nowMins;
    countdownHTML = `<span class="ns-countdown">in ${formatCountdown(minsUntil)}</span>`;
  } else if (state_label === 'tomorrow' && duty) {
    // Minutes until sign-on tomorrow
    const minsUntil = (24 * 60 - nowMins) + targetTiming.signOnMins;
    countdownHTML = `<span class="ns-countdown">in ${formatCountdown(minsUntil)}</span>`;
  }

  // Build date line
  const dayName = DAY_LONG[targetDate.getDay()];
  const dateStr = `${dayName} ${targetDate.getDate()} ${MONTH_SHORT[targetDate.getMonth()]}`;

  let labelText = '';
  if (state_label === 'on-shift') labelText = 'ON SHIFT NOW';
  else if (state_label === 'today') labelText = 'TODAY';
  else if (state_label === 'tomorrow') labelText = 'TOMORROW';
  else if (state_label === 'relief') labelText = 'NEXT — RELIEF WEEK';
  else labelText = `IN ${daysAhead} DAYS`;

  let innerHTML = '';

  if (state_label === 'relief') {
    innerHTML = `
      <div class="ns-label"><span class="ns-pulse"></span>${labelText}</div>
      <div class="ns-date-line">${dateStr}</div>
      <div class="ns-sub">On call — check Self Service for assignments</div>`;
  } else if (targetTiming.hasShift && duty) {
    const typeLabel = targetTiming.posType || 'Custom';
    const workLabel = `${targetTiming.workH}h${String(targetTiming.workM).padStart(2,'0')}`;
    const timeDisplay = state_label === 'on-shift' ? signOffDisplay : signOnDisplay;
    const timeTag = state_label === 'on-shift' ? 'off' : 'on';
    innerHTML = `
      <div class="ns-label"><span class="ns-pulse"></span>${labelText} ${countdownHTML}</div>
      <div class="ns-date-line">${dateStr}</div>
      <div class="ns-main">
        <span class="ns-time">${timeDisplay}</span>
        <span class="ns-time-label">${timeTag}</span>
        <span class="ns-detail-row">
          Duty <strong>${targetTiming.dutyNum}</strong>
          <span class="ns-dot">·</span>${typeLabel}
          <span class="ns-dot">·</span>${workLabel}
          ${state_label !== 'on-shift' ? `<span class="ns-dot">·</span>Off <strong>${signOffDisplay}</strong>` : ''}
        </span>
      </div>`;
  }

  card.innerHTML = `<div class="ns-card ${state_label}" id="ns-card-inner">${innerHTML}</div>`;

  // Tap card to jump to that day
  document.getElementById('ns-card-inner').addEventListener('click', () => {
    const iso = fmtISO(targetDate);
    state.currentView = 'week';
    state.viewWeekAnchor = fmtISO(startOfWeek(targetDate));
    document.querySelectorAll('.view-toggle button').forEach(b => {
      b.classList.toggle('active', b.dataset.view === 'week');
    });
    renderMain();
    // Small delay so week renders first
    setTimeout(() => openDayModal(iso), 100);
  });
}

// Auto-refresh the next shift card every minute so countdowns stay live
setInterval(() => {
  if (!document.getElementById('main-view').classList.contains('hidden')) {
    renderNextShift();
  }
}, 60000);

function renderMain() {
  document.getElementById('setup-view').classList.add('hidden');
  document.getElementById('main-view').classList.remove('hidden');
  document.getElementById('settings-btn').classList.remove('active');
  // Return history to base app state when coming back from setup
  if (history.state && history.state.setup) {
    history.replaceState({ app: true }, '');
  }
  // Show swap button only in week view; hide week-nav in swaps view
  const swapBtn = document.getElementById('plan-swap-btn');
  const weekNav = document.getElementById('week-nav');
  swapBtn.style.display = state.currentView === 'week' ? '' : 'none';
  weekNav.style.display = (state.currentView === 'swaps' || state.currentView === 'positions') ? 'none' : '';

  renderNextShift();

  if (state.currentView === 'week') {
    document.getElementById('week-view').classList.remove('hidden');
    document.getElementById('month-view').classList.add('hidden');
    document.getElementById('swaps-view').classList.add('hidden');
    document.getElementById('positions-view').classList.add('hidden');
    renderWeek();
  } else if (state.currentView === 'swaps') {
    document.getElementById('week-view').classList.add('hidden');
    document.getElementById('month-view').classList.add('hidden');
    document.getElementById('swaps-view').classList.remove('hidden');
    document.getElementById('positions-view').classList.add('hidden');
    document.getElementById('summary').innerHTML = '';
    renderSwaps();
  } else if (state.currentView === 'positions') {
    document.getElementById('week-view').classList.add('hidden');
    document.getElementById('month-view').classList.add('hidden');
    document.getElementById('swaps-view').classList.add('hidden');
    document.getElementById('positions-view').classList.remove('hidden');
    document.getElementById('summary').innerHTML = '';
    renderPositions();
  } else {
    document.getElementById('week-view').classList.add('hidden');
    document.getElementById('month-view').classList.remove('hidden');
    document.getElementById('swaps-view').classList.add('hidden');
    document.getElementById('positions-view').classList.add('hidden');
    renderMonth();
  }
}

function renderSwaps() {
  const container = document.getElementById('swaps-view');
  container.innerHTML = '';

  // Collect all swaps, sort by date
  const allSwaps = Object.entries(state.swaps).map(([sunISO, swap]) => ({
    sunISO, ...swap
  })).sort((a, b) => a.sunISO.localeCompare(b.sunISO));

  if (allSwaps.length === 0) {
    container.innerHTML = `
      <div class="swaps-empty">
        <div class="swaps-empty-icon">🔄</div>
        <div>No swaps planned yet.</div>
        <div style="margin-top:6px; font-size:12px;">Switch to Week view and tap <strong>+ Swap</strong> to plan one,<br>or tap a position number in Month view.</div>
      </div>`;
    return;
  }

  const today = fmtISO(new Date());
  const upcoming = allSwaps.filter(s => s.sunISO >= today);
  const past = allSwaps.filter(s => s.sunISO < today);

  const renderGroup = (items, label) => {
    if (!items.length) return;
    const lbl = document.createElement('div');
    lbl.className = 'swap-section-label';
    lbl.textContent = label;
    container.appendChild(lbl);

    items.forEach(swap => {
      const sun = parseISODate(swap.sunISO);
      const weekEnd = addDays(sun, 6);
      const rangeStr = `${sun.getDate()} ${MONTH_SHORT[sun.getMonth()]} – ${weekEnd.getDate()} ${MONTH_SHORT[weekEnd.getMonth()]} ${sun.getFullYear()}`;
      const detail = swap.theirPosition
        ? `P${swap.theirPosition} · ${GROUP_DISPLAY_NAMES[swap.theirGroup] || swap.theirGroup}`
        : swap.duties ? 'custom duties' : 'position TBC';

      // Build a quick day summary
      let dayChips = '';
      if (swap.duties) {
        dayChips = DAYS.map(day => {
          const v = swap.duties[day];
          if (!v) return `<span class="sc-day">${day.substring(0,2)}</span>`;
          return `<span class="sc-day work">${day.substring(0,2)} ${v}</span>`;
        }).join('');
      } else if (swap.theirPosition && swap.theirGroup) {
        // Show what days they work that week
        const grp = ROSTER_DATA.rotations[swap.theirGroup];
        const pos = grp && grp.find(p => p.p === swap.theirPosition);
        if (pos) {
          dayChips = DAYS.map(day => {
            const cell = pos.d[day];
            if (!cell || cell.type === 'off') return `<span class="sc-day">${day.substring(0,2)}</span>`;
            return `<span class="sc-day work">${day.substring(0,2)} ${cell.d || '–'}</span>`;
          }).join('');
        }
      }

      const card = document.createElement('div');
      card.className = `swap-card ${swap.status}`;
      card.innerHTML = `
        <div class="sc-header">
          <span class="sc-badge">${swap.status}</span>
          <span class="sc-week">${rangeStr}</span>
          <span class="sc-arrow">›</span>
        </div>
        <div class="sc-with">with ${swap.with} · ${detail}</div>
        ${dayChips ? `<div class="sc-shifts">${dayChips}</div>` : ''}
        ${swap.note ? `<div style="font-size:11px; color:var(--text-faint); margin-top:6px;">${swap.note}</div>` : ''}
      `;
      card.addEventListener('click', () => {
        // Switch to week view for this swap week, then open the swap modal
        state.currentView = 'week';
        state.viewWeekAnchor = swap.sunISO;
        document.querySelectorAll('.view-toggle button').forEach(b => {
          b.classList.toggle('active', b.dataset.view === 'week');
        });
        renderMain();
        openSwapModal(swap.sunISO);
      });
      container.appendChild(card);
    });
  };

  const pendingUpcoming = upcoming.filter(s => s.status === 'pending');
  const confirmedUpcoming = upcoming.filter(s => s.status === 'confirmed');

  if (pendingUpcoming.length) renderGroup(pendingUpcoming, `Pending · ${pendingUpcoming.length} need confirming`);
  if (confirmedUpcoming.length) renderGroup(confirmedUpcoming, 'Confirmed upcoming');
  if (past.length) renderGroup(past, 'Past');
}

function renderPositions() {
  const container = document.getElementById('positions-view');
  container.innerHTML = '';

  const anchor = state.posViewAnchor
    ? parseISODate(state.posViewAnchor)
    : (state.viewWeekAnchor ? parseISODate(state.viewWeekAnchor) : startOfWeek(new Date()));
  const weekEnd = addDays(anchor, 6);
  const rangeStr = `${anchor.getDate()} ${MONTH_SHORT[anchor.getMonth()]} – ${weekEnd.getDate()} ${MONTH_SHORT[weekEnd.getMonth()]} ${anchor.getFullYear()}`;

  // Week nav
  const nav = document.createElement('div');
  nav.className = 'pos-week-nav';
  nav.innerHTML = `
    <button class="nav-btn" id="pos-prev">‹</button>
    <div class="pos-week-label">${rangeStr}</div>
    <button class="nav-btn" id="pos-next">›</button>
  `;
  container.appendChild(nav);
  document.getElementById('pos-prev').addEventListener('click', () => {
    state.posViewAnchor = fmtISO(addDays(anchor, -7));
    renderPositions();
  });
  document.getElementById('pos-next').addEventListener('click', () => {
    state.posViewAnchor = fmtISO(addDays(anchor, 7));
    renderPositions();
  });

  // Search
  const searchBox = document.createElement('input');
  searchBox.type = 'number'; searchBox.inputMode = 'numeric';
  searchBox.className = 'pos-search';
  searchBox.placeholder = 'Jump to position...';
  searchBox.addEventListener('input', () => renderList(searchBox.value.trim()));
  container.appendChild(searchBox);

  const listEl = document.createElement('div');
  listEl.id = 'pos-list';
  container.appendChild(listEl);

  function typeClass(posType) {
    if (!posType) return '';
    const t = posType.toLowerCase();
    if (t.includes('early')) return 'early';
    if (t.includes('day')) return 'day-type';
    if (t.includes('middle')) return 'middle';
    if (t.includes('late')) return 'late';
    return '';
  }

  function renderList(filter) {
    listEl.innerHTML = '';
    const group = ROSTER_DATA.rotations['FT md'];
    if (!group) return;
    const sorted = [...group].sort((a, b) => a.p - b.p);
    const filtered = filter ? sorted.filter(p => String(p.p).startsWith(filter)) : sorted;
    if (filtered.length === 0) {
      listEl.innerHTML = '<div style="text-align:center;color:var(--text-dim);padding:24px;font-size:13px;">No positions found</div>';
      return;
    }

    const myPos = getPositionForDate(anchor);

    filtered.forEach(pos => {
      const oKind = offKind(pos.t);
      const isRelief = oKind === 'relief' || oKind === 'dummy';
      const isMe = myPos && myPos.p === pos.p;
      const tc = typeClass(pos.t);
      const borderColour = tc === 'early' ? 'var(--early)' : tc === 'day-type' ? 'var(--day)' : tc === 'middle' ? 'var(--middle)' : tc === 'late' ? 'var(--late)' : 'var(--line)';

      const row = document.createElement('div');
      row.className = 'pos-row' + (isRelief ? ' relief-row' : '');
      if (isMe) {
        row.style.border = '2px solid var(--accent)';
        row.style.boxShadow = '0 0 0 1px var(--accent)';
      } else if (!isRelief) {
        row.style.borderLeft = `3px solid ${borderColour}`;
      }

      // Build day columns
      let dayCols = '';
      if (isRelief) {
        dayCols = ''; // type label in header is enough
      } else {
        dayCols = `<div style="display:flex;gap:3px;flex-wrap:wrap;margin-top:5px;">` +
          DAYS.map(day => {
            const fakeSwap = { theirPosition: pos.p, theirGroup: 'FT md' };
            const d = addDays(anchor, DAYS.indexOf(day));
            const shift = getSwapShift(d, fakeSwap);
            if (!shift || shift.kind === 'off') {
              return `<div style="flex:1;min-width:38px;text-align:center;padding:3px 0;">
                <div style="font-size:9px;color:var(--text-faint);font-weight:700">${day.substring(0,2).toUpperCase()}</div>
                <div style="font-size:9px;color:var(--text-faint)">—</div>
              </div>`;
            }
            const offStr = shift.duty.off.replace('+1','');
            return `<div style="flex:1;min-width:38px;text-align:center;padding:3px 0;">
              <div style="font-size:9px;color:var(--text-faint);font-weight:700">${day.substring(0,2).toUpperCase()}</div>
              <div style="font-size:11px;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--text)">${shift.dutyNum}</div>
              <div style="font-size:9px;color:var(--text-dim);line-height:1.3">${shift.duty.on}<br>${offStr}</div>
            </div>`;
          }).join('') + `</div>`;
      }

      // Calculate total worked minutes from roster data
      let workedMins = 0;
      if (!isRelief && pos.d) {
        Object.values(pos.d).forEach(day => {
          if (day && day.type === 'duty') workedMins += (day.h || 0) * 60 + (day.m || 0);
        });
      }
      const workedH = Math.floor(workedMins / 60);
      const workedM = workedMins % 60;
      const workedStr = workedMins > 0 ? `${workedH}h${String(workedM).padStart(2,'0')}` : null;

      const paid = ROSTER_PAID_HOURS[pos.p];
      const hoursBar = (!isRelief && (workedStr || paid)) ? `
        <div style="display:flex;gap:8px;margin-top:3px;font-size:11px;font-family:'JetBrains Mono',monospace;">
          ${workedStr ? `<span style="color:var(--text-dim)">work <span style="color:var(--text);font-weight:700">${workedStr}</span></span>` : ''}
          ${workedStr && paid ? `<span style="color:var(--line)">·</span>` : ''}
          ${paid ? `<span style="color:var(--text-dim)">paid <span style="color:var(--accent-bright);font-weight:700">${paid}</span></span>` : ''}
        </div>` : '';

      row.innerHTML = `
        <div class="pos-row-header">
          <span class="pos-row-num">P${pos.p}</span>
          <span class="pos-row-type" style="margin-left:4px">${pos.t}</span>
          ${isMe ? '<span style="font-size:10px;color:var(--accent-bright);font-weight:700;margin-left:auto;">YOU</span>' : ''}
        </div>
        ${hoursBar}
        ${dayCols}
      `;

      row.addEventListener('click', () => {
        openSwapModal(fmtISO(anchor));
        setTimeout(() => {
          const posInput = document.getElementById('sw-pos');
          if (posInput) posInput.value = pos.p;
        }, 150);
      });

      listEl.appendChild(row);
    });
  }

  renderList('');
}

function updatePosPill(forDate) {
  // Show the position for the week containing forDate
  const pill = document.getElementById('pos-pill');
  const position = getPositionForDate(forDate);
  if (!position) {
    pill.textContent = 'P' + state.position;
    pill.classList.remove('rotated');
    return;
  }
  pill.textContent = 'P' + position.p;
  // Add a subtle rotated style if this isn't your anchor position (so you know you've rotated)
  if (position.p !== state.position) {
    pill.classList.add('rotated');
  } else {
    pill.classList.remove('rotated');
  }
}

function renderWeek() {
  document.getElementById('week-view').classList.remove('hidden');
  document.getElementById('month-view').classList.add('hidden');
  const container = document.getElementById('week-view');
  const anchor = state.viewWeekAnchor ? parseISODate(state.viewWeekAnchor) : startOfWeek(new Date());
  const start = startOfWeek(anchor);
  const end = addDays(start, 6);

  updatePosPill(start);

  // Header
  const navMonth = document.getElementById('nav-month');
  const navRange = document.getElementById('nav-range');
  if (start.getMonth() === end.getMonth()) {
    navMonth.textContent = `${MONTH_LONG[start.getMonth()].toUpperCase()} ${start.getFullYear()}`;
    navRange.textContent = `${start.getDate()} – ${end.getDate()} ${MONTH_SHORT[start.getMonth()]}`;
  } else {
    navMonth.textContent = `${MONTH_LONG[start.getMonth()].toUpperCase()} – ${MONTH_LONG[end.getMonth()].toUpperCase()}`;
    navRange.textContent = `${start.getDate()} ${MONTH_SHORT[start.getMonth()]} – ${end.getDate()} ${MONTH_SHORT[end.getMonth()]}`;
  }

  container.innerHTML = '';
  const todayISO = fmtISO(new Date());
  let totalMins = 0;
  let workDays = 0;

  // If this week has a swap, render a banner
  const weekSunISO = fmtISO(start);
  const weekSwap = state.swaps[weekSunISO];
  if (weekSwap) {
    const banner = document.createElement('div');
    banner.className = 'swap-banner' + (weekSwap.status === 'confirmed' ? ' confirmed' : '');
    const statusLabel = weekSwap.status === 'confirmed' ? 'CONFIRMED' : 'PENDING';
    const detail = weekSwap.theirPosition
      ? `P${weekSwap.theirPosition} · ${GROUP_DISPLAY_NAMES[weekSwap.theirGroup] || weekSwap.theirGroup}`
      : weekSwap.duties ? 'custom duties' : 'position TBC';
    banner.innerHTML = `
      <span class="sb-label">SWAP · ${statusLabel}</span>
      <span class="sb-with">with ${weekSwap.with} · ${detail}</span>
      <span class="sb-edit">edit ›</span>
    `;
    banner.addEventListener('click', () => openSwapModal(weekSunISO));
    container.appendChild(banner);
  }

  for (let i = 0; i < 7; i++) {
    const d = addDays(start, i);
    const shift = getShiftForDate(d);
    const iso = fmtISO(d);
    const isToday = iso === todayISO;

    const card = document.createElement('div');
    let classes = 'day-card';
    const tClass = typeClass(shift.posType);
    const oKind = offKind(shift.posType);
    if (shift.kind === 'work' && tClass) classes += ' type-' + tClass;
    if (shift.kind === 'off') {
      if (shift.overridden) classes += ' off'; // manually marked off — plain style
      else if (oKind === 'relief' || oKind === 'dummy') classes += ' relief';
      else if (oKind === 'pld') classes += ' pld';
      else classes += ' off';
    }
    // Swap status classes - apply if this day is in a swap week
    if (shift.swap) {
      classes += shift.swap.status === 'confirmed' ? ' swap-confirmed' : ' swap-pending';
    }
    if (isToday) classes += ' today';
    card.className = classes;
    card.dataset.iso = iso;

    const info = `<div class="day-info"><div class="dow">${DAYS[d.getDay()].toUpperCase()}</div><div class="dnum">${d.getDate()}</div></div>`;

    let meta = '';
    const ovMark = shift.overridden ? '<span class="ov-marker">EDIT</span>' : '';
    const swapMark = shift.fromSwap
      ? '<span class="swap-marker confirmed">SWAP</span>'
      : (shift.pendingSwap ? '<span class="swap-marker">SWAP?</span>' : '');

    if (shift.kind === 'work' && shift.duty) {
      const mr = shift.mealRelief ? '<span class="mr-badge">MR</span>' : '';
      let subLabel;
      if (shift.fromSwap) {
        subLabel = `Swapped · ${shift.workH}h${String(shift.workM).padStart(2,'0')} work`;
      } else if (shift.overridden) {
        subLabel = `Custom · ${shift.workH}h${String(shift.workM).padStart(2,'0')} work`;
      } else {
        subLabel = `${shift.posType} · ${shift.workH}h${String(shift.workM).padStart(2,'0')} work`;
      }
      // For pending swaps: show what you'd be doing if swap goes through
      let pendingRow = '';
      if (shift.pendingSwap) {
        if (shift.pendingSwap.kind === 'work' && shift.pendingSwap.duty) {
          pendingRow = `<div class="pending-original">→ if swapped: ${shift.pendingSwap.dutyNum} · ${shift.pendingSwap.duty.on}–${shift.pendingSwap.duty.off.replace('+1',' +1')}</div>`;
        } else if (shift.pendingSwap.kind === 'off') {
          pendingRow = `<div class="pending-original">→ if swapped: off</div>`;
        }
      }
      meta = `<div class="day-meta">
        <div class="shift-line">
          <span class="duty-num">${shift.dutyNum}</span>
          <span class="times">${shift.duty.on} – ${shift.duty.off.replace('+1',' +1')}</span>
          ${mr}${ovMark}${swapMark}
        </div>
        <div class="shift-sub">${subLabel}</div>
        ${pendingRow}
      </div>`;
      totalMins += shift.workH * 60 + shift.workM;
      workDays++;
    } else if (shift.kind === 'off') {
      if (shift.fromSwap) {
        meta = `<div class="day-meta"><div class="off-label">Off ${swapMark}</div><div class="shift-sub">Swap day off</div></div>`;
      } else if (shift.overridden) {
        meta = `<div class="day-meta"><div class="off-label">Off ${ovMark}</div><div class="shift-sub">Marked off</div></div>`;
      } else if (oKind === 'relief') {
        meta = `<div class="day-meta"><div class="relief-label full">RELIEF ${swapMark}</div><div class="shift-sub">On call — check assignments</div></div>`;
      } else if (oKind === 'dummy') {
        meta = `<div class="day-meta"><div class="relief-label dummy">DUMMY RELIEF ${swapMark}</div><div class="shift-sub">Spare — may be assigned</div></div>`;
      } else if (oKind === 'pld') {
        meta = `<div class="day-meta"><div class="off-label">PLD</div><div class="shift-sub">Planned leave day</div></div>`;
      } else {
        meta = `<div class="day-meta"><div class="off-label">Off ${swapMark}</div><div class="shift-sub">${shift.posType || ''}</div></div>`;
      }
      // For pending swaps on off days: show what you'd take on
      if (shift.pendingSwap && shift.pendingSwap.kind === 'work' && shift.pendingSwap.duty) {
        meta = meta.replace('</div></div>',
          `</div><div class="pending-original">→ if swapped: ${shift.pendingSwap.dutyNum} · ${shift.pendingSwap.duty.on}–${shift.pendingSwap.duty.off.replace('+1',' +1')}</div></div>`);
      }
    } else {
      meta = `<div class="day-meta"><div class="off-label">—</div></div>`;
    }

    card.innerHTML = info + meta + '<div class="day-arrow">›</div>';
    card.addEventListener('click', () => openDayModal(iso));
    container.appendChild(card);
  }

  const weekPos = getPositionForDate(start);
  const weekPosNum = weekPos ? weekPos.p : null;
  renderSummary(totalMins, workDays, 0, weekPosNum);
}

function renderMonth() {
  document.getElementById('week-view').classList.add('hidden');
  document.getElementById('month-view').classList.remove('hidden');
  const container = document.getElementById('month-view');

  let anchor;
  if (state.viewMonth) {
    anchor = new Date(state.viewMonth.year, state.viewMonth.month, 1);
  } else {
    const d = state.viewWeekAnchor ? parseISODate(state.viewWeekAnchor) : new Date();
    anchor = new Date(d.getFullYear(), d.getMonth(), 1);
  }
  const year = anchor.getFullYear();
  const month = anchor.getMonth();

  // Show position for the first day of the month (or today if this month contains today)
  const today = new Date();
  const pillDate = (today.getMonth() === month && today.getFullYear() === year) ? today : new Date(year, month, 1);
  updatePosPill(pillDate);

  document.getElementById('nav-month').textContent = `${MONTH_LONG[month].toUpperCase()} ${year}`;
  document.getElementById('nav-range').textContent = '';

  // Grid starts on Sunday of week containing day 1
  const firstOfMonth = new Date(year, month, 1);
  const gridStart = startOfWeek(firstOfMonth);

  container.innerHTML = '';

  // Wrapper to hold pos column + grid side by side
  const wrap = document.createElement('div');
  wrap.className = 'month-grid-wrap';

  // Left column: position number per week row
  const posCol = document.createElement('div');
  posCol.className = 'week-pos-col';

  const grid = document.createElement('div');
  grid.className = 'month-grid';

  // Headers (grid only, pos col has padding to match)
  DAYS.forEach(d => {
    const h = document.createElement('div');
    h.className = 'mg-head';
    h.textContent = d.charAt(0);
    grid.appendChild(h);
  });

  const todayISO = fmtISO(new Date());
  let totalMins = 0, workDays = 0, offDays = 0;
  const reliefWeekSet = new Set(); // track unique relief week Sundays
  let lastRowWeek = -1;

  for (let i = 0; i < 42; i++) {
    const d = addDays(gridStart, i);
    const iso = fmtISO(d);
    const inMonth = d.getMonth() === month;
    const isToday = iso === todayISO;

    // On each Sunday (start of row), add a position label to posCol
    if (d.getDay() === 0) {
      const rowWeek = Math.floor(i / 7);
      if (rowWeek !== lastRowWeek) {
        lastRowWeek = rowWeek;
        const pos = getPositionForDate(d);
        const posLabel = document.createElement('div');
        posLabel.className = 'week-pos-label';
        if (pos) {
          const ok = offKind(pos.t);
          if (ok === 'relief') posLabel.classList.add('relief-pos');
          else if (ok === 'dummy') posLabel.classList.add('dummy-pos');
          const weekSwap = state.swaps[fmtISO(d)];
          const hasRealSwap = weekSwap && (weekSwap.theirPosition || weekSwap.duties);
          const isNoteOnly = weekSwap && !weekSwap.theirPosition && !weekSwap.duties;
          if (hasRealSwap) {
            const arrowColour = weekSwap.status === 'confirmed' ? '#ffc107' : '#4ac8ff';
            const arrowSvg = `<svg width="12" height="10" viewBox="0 0 12 10" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M1 3H9M9 3L7 1M9 3L7 5" stroke="${arrowColour}" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M11 7H3M3 7L5 5M3 7L5 9" stroke="${arrowColour}" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>`;
            posLabel.innerHTML = `${pos.p}<span style="display:block;margin-top:2px;">${arrowSvg}</span>`;
          } else if (isNoteOnly) {
            const pencilSvg = `<svg width="10" height="10" viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7 1L9 3L3.5 8.5L1 9L1.5 6.5L7 1Z" stroke="#ffc107" stroke-width="1.2" stroke-linejoin="round"/><path d="M6 2L8 4" stroke="#ffc107" stroke-width="1.2"/></svg>`;
            posLabel.innerHTML = `${pos.p}<span style="display:block;margin-top:2px;">${pencilSvg}</span>`;
          } else {
            posLabel.textContent = pos.p;
          }
          posLabel.title = `P${pos.p} · ${pos.t} — tap to plan a swap for this week`;
          posLabel.style.cursor = 'pointer';
          posLabel.addEventListener('click', () => openSwapModal(fmtISO(d)));
        }
        posCol.appendChild(posLabel);
      }
    }

    const cell = document.createElement('div');
    const shift = getShiftForDate(d);
    const tClass = typeClass(shift.posType);
    const oKind = offKind(shift.posType);
    let classes = 'mg-cell';
    if (!inMonth) classes += ' out';
    if (shift.kind === 'work' && tClass) classes += ' type-' + tClass;
    if (shift.kind === 'off') {
      if (shift.overridden) classes += ' off-day'; // manually marked off — plain style
      else if (oKind === 'relief' || oKind === 'dummy') classes += ' relief';
      else if (oKind === 'pld') classes += ' pld';
      else classes += ' off-day';
    }
    if (isToday) classes += ' today';
    cell.className = classes;
    cell.dataset.iso = iso;

    let body = '';
    const ovDot = shift.overridden ? '<div class="ov-dot" title="Overridden"></div>' : '';
    const swapDot = (shift.swap && d.getDay() === 0 && (shift.swap.theirPosition || shift.swap.duties) && shift.swap.status === 'confirmed')
      ? `<div class="swap-dot confirmed" title="Confirmed swap"></div>`
      : '';

    if (shift.kind === 'work' && shift.duty) {
      const offTime = shift.duty.off.replace('+1','');
      const isPending = shift.pendingSwap && (shift.swap.theirPosition || shift.swap.duties);
      const ps = isPending ? shift.pendingSwap : null;
      if (ps && ps.kind === 'work' && ps.duty) {
        // Pending swap to work week — show their schedule in faded blue
        const psOff = ps.duty.off.replace('+1','');
        body = `
          ${ovDot}${swapDot}
          <div class="md">${d.getDate()}</div>
          <div class="mg-duty mg-pending-duty">${ps.dutyNum}</div>
          <div class="mg-times mg-pending-times">${ps.duty.on}<br>${psOff}</div>
        `;
      } else if (ps && (ps.kind === 'off' || ps.kind === 'unknown')) {
        // Pending swap to off/relief — show faded RELIEF
        const pendingLabel = offKind(ps.posType) === 'relief' ? 'RELIEF' : 'OFF';
        body = `
          ${ovDot}${swapDot}
          <div class="md">${d.getDate()}</div>
          <div class="mg-relief" style="opacity:0.5;margin-top:14px;">${pendingLabel}</div>
        `;
      } else {
        body = `
          ${ovDot}${swapDot}
          <div class="md">${d.getDate()}</div>
          <div class="mg-duty">${shift.dutyNum}</div>
          <div class="mg-times">${shift.duty.on}<br>${offTime}</div>
          ${shift.mealRelief ? '<div class="mg-hub">hub</div>' : ''}
        `;
      }
      if (inMonth) { totalMins += shift.workH * 60 + shift.workM; workDays++; }
    } else if (shift.kind === 'off') {
      const isPending = shift.pendingSwap && (shift.swap && (shift.swap.theirPosition || shift.swap.duties));
      const ps = isPending ? shift.pendingSwap : null;
      if (ps && ps.kind === 'work' && ps.duty) {
        // Pending swap from off/relief to work — show their schedule faded
        const psOff = ps.duty.off.replace('+1','');
        body = `
          ${ovDot}${swapDot}
          <div class="md">${d.getDate()}</div>
          <div class="mg-duty mg-pending-duty">${ps.dutyNum}</div>
          <div class="mg-times mg-pending-times">${ps.duty.on}<br>${psOff}</div>
        `;
        if (inMonth) reliefWeekSet.add(fmtISO(startOfWeek(d)));
      } else if (shift.overridden) {
        body = `${ovDot}${swapDot}<div class="md">${d.getDate()}</div><div class="mg-off">OFF</div>`;
      } else if (oKind === 'relief') {
        body = `${ovDot}${swapDot}<div class="md">${d.getDate()}</div><div class="mg-relief">RELIEF</div>`;
        if (inMonth) reliefWeekSet.add(fmtISO(startOfWeek(d)));
      } else if (oKind === 'dummy') {
        body = `${ovDot}${swapDot}<div class="md">${d.getDate()}</div><div class="mg-relief dummy">DUMMY</div>`;
        if (inMonth) reliefWeekSet.add(fmtISO(startOfWeek(d)));
      } else if (oKind === 'pld') {
        body = `${ovDot}${swapDot}<div class="md">${d.getDate()}</div><div class="mg-off">PLD</div>`;
      } else {
        body = `${ovDot}${swapDot}<div class="md">${d.getDate()}</div><div class="mg-off">OFF</div>`;
      }
      if (inMonth) offDays++;
    } else {
      body = `<div class="md">${d.getDate()}</div>`;
    }

    cell.innerHTML = body;
    cell.addEventListener('click', () => openDayModal(iso));
    grid.appendChild(cell);
    if (i >= 34 && d.getMonth() !== month) break;
  }

  wrap.appendChild(posCol);
  wrap.appendChild(grid);
  container.appendChild(wrap);

  // Legend
  const legend = document.createElement('div');
  legend.className = 'legend';
  const legendItems = [
    { cls: 'early',  label: 'Early (sign on before ~07:00)' },
    { cls: 'day',    label: 'Day (07:00–10:00)' },
    { cls: 'middle', label: 'Middle (10:00–14:00)' },
    { cls: 'late',   label: 'Late (after 14:00)' },
  ];
  legendItems.forEach(({ cls, label }) => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = `<div class="legend-swatch" style="background: var(--${cls})"></div><span>${label}</span>`;
    legend.appendChild(item);
  });
  container.appendChild(legend);

  const monthPos = getPositionForDate(new Date(year, month, 1));
  renderSummary(totalMins, workDays, reliefWeekSet.size, null);
}

function renderSummary(totalMins, workDays, reliefWeeks = 0, position = null) {
  const h = Math.floor(totalMins / 60);
  const m = totalMins % 60;
  const reliefNote = reliefWeeks > 0
    ? `<div style="grid-column:1/-1; font-size:11px; color:var(--text-dim); padding:2px 4px;">
        + ${reliefWeeks} relief week${reliefWeeks > 1 ? 's' : ''} not counted — check Self Service for assignments
       </div>`
    : '';

  // Paid hours card — sourced from master roster
  let paidCard = '';
  if (position !== null) {
    const paid = ROSTER_PAID_HOURS[position];
    if (paid) {
      const [ph, pm] = paid.split('h');
      paidCard = `
    <div class="sum-card" title="Paid hours from MTT26a master roster for position ${position}">

      <div class="sum-value" style="color:var(--accent-bright)">${ph}<span style="font-size:14px; color:var(--text-dim)">h</span>${pm || '00'}</div>

      <div class="sum-value">${workDays}</div>

      <div class="sum-value">${h}<span style="font-size:14px; color:var(--text-dim)">h</span>${String(m).padStart(2,'0')}</div>

    </div>
    ${reliefNote}
  `;
}

// --- Modal ---
function openDayModal(iso) {
  const d = parseISODate(iso);
  const shift = getShiftForDate(d);
  const rostered = getRosteredShift(d);
  const content = document.getElementById('modal-content');
  const dowName = DAY_LONG[d.getDay()];

  const posLabel = shift.position ? `Pos ${shift.position}` : '';
  const ovBadge = shift.overridden ? '<span class="ov-badge">OVERRIDDEN</span>' : '';

  // Back button at top of modal
  let body = `
    <button class="modal-back" id="modal-back-btn" aria-label="Back">←</button>
    <h3 style="padding-left:40px">${d.getDate()} ${MONTH_SHORT[d.getMonth()]} ${ovBadge}</h3>
    <div class="mdate">${dowName} · ${MONTH_LONG[d.getMonth()]} ${d.getFullYear()}${posLabel ? ' · ' + posLabel : ''}</div>
  `;

  if (shift.kind === 'work' && shift.duty) {
    const mr = shift.mealRelief ? '<span class="mr-badge" style="margin-left:8px">MEAL RELIEF</span>' : '';
    const shiftLabel = shift.overridden ? 'Custom' : `${shift.posType} Shift`;
    const categoryLabel = shift.category === 'CUSTOM' ? 'Standby / spare' : shift.category.replace('MON-THU','Mon–Thu') + ' duty';
    body += `
      <div class="shift-header">
        <div class="big-duty">${shift.dutyNum}</div>
        <div>
          <div class="type-label">${shiftLabel}</div>
          <div class="type-name">${categoryLabel}${mr}</div>
        </div>
      </div>
      <div class="timeline">
        <div class="tl-row"><div class="tl-icon">▶</div><div class="tl-body"><div class="tl-label">Sign on</div><div class="tl-time">${shift.duty.on}</div></div></div>
        ${shift.duty.ms ? `<div class="tl-row"><div class="tl-icon">☕</div><div class="tl-body"><div class="tl-label">Meal break</div><div class="tl-time">${shift.duty.ms} – ${shift.duty.me || '?'}</div>${shift.duty.mp ? `<div class="tl-sub">${shift.duty.mp}</div>`:''}</div></div>` : ''}
        <div class="tl-row"><div class="tl-icon">■</div><div class="tl-body"><div class="tl-label">Sign off</div><div class="tl-time">${shift.duty.off}</div></div></div>
      </div>
      <div class="worktime-badge">${shift.workH}h ${String(shift.workM).padStart(2,'0')}m work time</div>
    `;
  } else if (shift.kind === 'off') {
    const label = shift.overridden ? 'Marked off' : `Rostered off${shift.posType ? ' · ' + shift.posType + ' position' : ''}`;
    body += `<div class="empty"><div class="big">—</div><div>${label}</div></div>`;
  } else {
    body += `<div class="empty"><div class="big">?</div><div>No shift data available for this date</div></div>`;
  }

  // Override editor
  const existingCustomOn = shift.overridden && shift.duty && shift.duty.custom ? shift.duty.on : '';
  const existingCustomOff = shift.overridden && shift.duty && shift.duty.custom ? shift.duty.off : '';
  body += `
    <div class="edit-section">
      <div class="edit-title">Change shift for this day</div>
      <div class="edit-sub">Picked up OT, swapped, or got assigned a Relief duty? Override what this day shows.</div>
      <div class="edit-row">
        <input type="number" id="ov-duty" placeholder="Duty no." value="${shift.overridden && shift.kind==='work' ? shift.dutyNum : ''}" inputmode="numeric">
        <button class="btn-sm primary" id="ov-set">Set duty</button>
      </div>
      <div class="custom-times" id="custom-times">
        <label>On</label>
        <input type="time" id="custom-on" value="${existingCustomOn}">
        <label>Off</label>
        <input type="time" id="custom-off" value="${existingCustomOff}">
        <button class="btn-sm primary" id="ov-custom-save">Save</button>
      </div>
      <div class="custom-hint" id="custom-hint">Duty not in system — enter times manually</div>
      <div class="edit-row">
        <button class="btn-sm" id="ov-off">Mark off</button>
        ${state.overrides[iso] ? `<button class="btn-sm danger" id="ov-reset">Reset to rostered</button>` : ''}
      </div>
      ${rostered.kind === 'work' ? `<div class="edit-sub" style="margin-top:10px">Rostered: duty <b>${rostered.dutyNum}</b> · ${rostered.duty ? rostered.duty.on + '–' + rostered.duty.off.replace('+1',' +1') : ''}</div>` : rostered.kind === 'off' ? `<div class="edit-sub" style="margin-top:10px">Rostered: day off (${rostered.posType})</div>` : ''}
    </div>
  `;

  // Fill week — only show on relief/dummy relief weeks
  const rosteredOKind = offKind(rostered.posType);
  if (rosteredOKind === 'relief' || rosteredOKind === 'dummy') {
    const weekSun = startOfWeek(d);
    const todayISO2 = fmtISO(new Date());
    let rows = '';
    DAYS.forEach((dayName, i) => {
      const dayDate = addDays(weekSun, i);
      const dayISO = fmtISO(dayDate);
      const existing = state.overrides[dayISO];
      const existingDuty = existing && existing.kind === 'work' ? existing.dutyNum : '';
      const isOff = existing && existing.kind === 'off';
      const isCustom = existing && existing.category === 'CUSTOM';
      const existingOn = isCustom ? (existing.customOn || '') : '';
      const existingOff = isCustom ? (existing.customOff || '').replace('+1','') : '';
      const isToday = dayISO === todayISO2;

      rows += `
        <div class="fw-row" id="fwr-${dayISO}">
          <span class="fw-day-label${isToday ? ' today-day' : ''}">${dayName.substring(0,3).toUpperCase()}</span>
          <input class="fw-duty-input" type="number" inputmode="numeric"
            data-fw-iso="${dayISO}" placeholder="—" value="${existingDuty}"
            style="${isOff ? 'opacity:0.3' : ''}">
          <label style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-dim);flex-shrink:0;cursor:pointer;">
            <input type="checkbox" data-fw-off="${dayISO}" ${isOff ? 'checked' : ''}
              style="width:16px;height:16px;accent-color:var(--accent);cursor:pointer;">
            Off
          </label>
        </div>
        <div class="fw-custom-row${isCustom ? ' show' : ''}" id="fwt-${dayISO}">
          <label>On</label>
          <input type="time" data-fw-on="${dayISO}" value="${existingOn}">
          <label>Off</label>
          <input type="time" data-fw-off-time="${dayISO}" value="${existingOff}">
        </div>`;
    });
    body += `
      <div class="fill-week-section">
        <div class="fill-week-header" id="fw-header">
          <span class="fwh-title">Fill week duties</span>
          <span class="fwh-chevron">▼</span>
        </div>
        <div class="fill-week-body" id="fw-body">
          <div style="font-size:12px; color:var(--text-dim); margin-bottom:10px;">
            Enter duty numbers. Tick Off for rest days. Unknown duties show time fields.
          </div>
          ${rows}
          <div style="display:flex; gap:8px; margin-top:12px;">
            <button class="btn-sm primary" id="fw-save" style="flex:2">Save all</button>
            <button class="btn-sm danger" id="fw-clear" style="flex:1">Clear week</button>
          </div>
        </div>
      </div>`;
  }

  // Notes
  const existingNote = state.notes[iso] || '';
  body += `
    <div class="notes-area">
      <div class="notes-label">Notes</div>
      <textarea id="note-input" placeholder="Swapped with, OT, reminders…">${existingNote}</textarea>
    </div>
  `;

  content.innerHTML = body;
  document.getElementById('modal-bg').classList.add('show');
  document.getElementById('modal').classList.add('show');
  // Push a modal history entry — use replaceState if one already exists to avoid stacking
  if (history.state && history.state.modal) {
    history.replaceState({ modal: true }, '');
  } else {
    history.pushState({ modal: true }, '');
  }

  // Back button
  document.getElementById('modal-back-btn').addEventListener('click', closeModal);

  // Fill week toggle + save/clear (only present on relief/dummy weeks)
  const fwHeader = document.getElementById('fw-header');
  if (fwHeader) {
    const fwBody = document.getElementById('fw-body');
    fwHeader.addEventListener('click', () => {
      fwHeader.classList.toggle('open');
      fwBody.classList.toggle('open');
    });

    // Auto-show time inputs when an unknown duty number is typed
    fwBody.addEventListener('input', (e) => {
      if (!e.target.classList.contains('fw-duty-input')) return;
      const dayISO = e.target.dataset.fwIso;
      const val = e.target.value.trim();
      const timeRow = document.getElementById(`fwt-${dayISO}`);
      if (!timeRow) return;
      if (val === '' || val === '0') { timeRow.classList.remove('show'); return; }
      const n = parseInt(val, 10);
      if (!n) return;
      const cat = getDutyCategory(parseISODate(dayISO));
      const duty = lookupDuty(n, cat);
      timeRow.classList.toggle('show', !duty); // show times only for unknown duties
    });

    // Off checkbox disables duty input
    fwBody.addEventListener('change', (e) => {
      if (!e.target.dataset.fwOff) return;
      const dayISO = e.target.dataset.fwOff;
      const dutyInp = fwBody.querySelector(`[data-fw-iso="${dayISO}"]`);
      const timeRow = document.getElementById(`fwt-${dayISO}`);
      if (dutyInp) dutyInp.style.opacity = e.target.checked ? '0.3' : '1';
      if (timeRow && e.target.checked) timeRow.classList.remove('show');
    });

    document.getElementById('fw-save').addEventListener('click', () => {
      const inputs = fwBody.querySelectorAll('.fw-duty-input');
      let changed = 0;
      inputs.forEach(inp => {
        const dayISO = inp.dataset.fwIso;

        // Check off checkbox first
        const offCb = fwBody.querySelector(`[data-fw-off="${dayISO}"]`);
        if (offCb && offCb.checked) {
          state.overrides[dayISO] = { kind: 'off' };
          changed++;
          return;
        }

        const val = inp.value.trim();
        if (val === '' || val === '0') return; // leave as relief

        const n = parseInt(val, 10);
        if (!n) return;
        const cat = getDutyCategory(parseISODate(dayISO));
        const duty = lookupDuty(n, cat);

        if (!duty) {
          // Unknown duty — grab times from inline time inputs if provided
          const onInp = fwBody.querySelector(`[data-fw-on="${dayISO}"]`);
          const offInp = fwBody.querySelector(`[data-fw-off-time="${dayISO}"]`);
          const onVal = onInp ? onInp.value : '';
          const offVal = offInp ? offInp.value : '';
          let wh = 0, wm = 0, offDisplay = offVal;
          if (onVal && offVal) {
            const [onH, onM] = onVal.split(':').map(Number);
            const [offH, offM] = offVal.split(':').map(Number);
            let totalMins = (offH * 60 + offM) - (onH * 60 + onM);
            if (totalMins < 0) totalMins += 24 * 60;
            wh = Math.floor(totalMins / 60);
            wm = totalMins % 60;
            offDisplay = offH < onH ? offVal + '+1' : offVal;
          }
          state.overrides[dayISO] = { kind: 'work', dutyNum: n, category: 'CUSTOM',
            customOn: onVal, customOff: offDisplay, customWorkH: wh, customWorkM: wm };
          changed++;
          return;
        }
        state.overrides[dayISO] = { kind: 'work', dutyNum: n, category: cat };
        changed++;
      });
      if (changed > 0) {
        saveOverrides();
        closeModal();
        renderMain();
      }
    });

    document.getElementById('fw-clear').addEventListener('click', () => {
      if (!confirm('Clear all duty overrides for this week?')) return;
      fwBody.querySelectorAll('.fw-duty-input').forEach(inp => {
        delete state.overrides[inp.dataset.fwIso];
      });
      saveOverrides();
      closeModal();
      renderMain();
    });
  }

  // Wire note
  const ta = document.getElementById('note-input');
  ta.addEventListener('input', () => {
    if (ta.value.trim()) state.notes[iso] = ta.value;
    else delete state.notes[iso];
    saveNotes();
  });

  // Wire override buttons
  document.getElementById('ov-set').addEventListener('click', () => {
    const input = document.getElementById('ov-duty');
    const n = parseInt(input.value, 10);
    if (!n || n < 1) { input.focus(); return; }
    const cat = getDutyCategory(d);
    const duty = lookupDuty(n, cat);
    if (!duty) {
      // Unknown duty — show manual time entry
      input.style.borderColor = 'var(--accent)';
      document.getElementById('custom-times').classList.add('show');
      document.getElementById('custom-hint').classList.add('show');
      document.getElementById('custom-on').focus();
      return;
    }
    state.overrides[iso] = { kind: 'work', dutyNum: n, category: cat };
    saveOverrides();
    openDayModal(iso);
    renderMain();
  });

  document.getElementById('ov-custom-save').addEventListener('click', () => {
    const input = document.getElementById('ov-duty');
    const n = parseInt(input.value, 10);
    const onVal = document.getElementById('custom-on').value;
    const offVal = document.getElementById('custom-off').value;
    if (!n || !onVal || !offVal) {
      if (!onVal) document.getElementById('custom-on').focus();
      return;
    }
    // Compute work time from on/off
    const [onH, onM] = onVal.split(':').map(Number);
    const [offH, offM] = offVal.split(':').map(Number);
    let totalMins = (offH * 60 + offM) - (onH * 60 + onM);
    if (totalMins < 0) totalMins += 24 * 60; // crosses midnight
    const wh = Math.floor(totalMins / 60);
    const wm = totalMins % 60;
    const offDisplay = offH < onH ? offVal + '+1' : offVal; // +1 if past midnight
    state.overrides[iso] = {
      kind: 'work', dutyNum: n, category: 'CUSTOM',
      customOn: onVal, customOff: offDisplay,
      customWorkH: wh, customWorkM: wm,
    };
    saveOverrides();
    openDayModal(iso);
    renderMain();
  });
  document.getElementById('ov-off').addEventListener('click', () => {
    state.overrides[iso] = { kind: 'off' };
    saveOverrides();
    openDayModal(iso);
    renderMain();
  });
  const resetBtn = document.getElementById('ov-reset');
  if (resetBtn) {
    resetBtn.addEventListener('click', () => {
      delete state.overrides[iso];
      saveOverrides();
      openDayModal(iso);
      renderMain();
    });
  }
}
function closeModal() {
  const modal = document.getElementById('modal');
  const bg = document.getElementById('modal-bg');
  if (!modal.classList.contains('show')) return;
  modal.classList.remove('show');
  bg.classList.remove('show');
  // Navigate back to consume the history entry we pushed when opening
  history.back();
}

function closeModalSilent() {
  // Close without touching history — used by popstate handler which already went back
  document.getElementById('modal').classList.remove('show');
  document.getElementById('modal-bg').classList.remove('show');
}

// Intercept system/browser back — always stay in the app
window.addEventListener('popstate', (e) => {
  const modal = document.getElementById('modal');
  const setupVisible = !document.getElementById('setup-view').classList.contains('hidden');

  if (modal.classList.contains('show')) {
    // Back while modal open — close the modal
    closeModalSilent();
  } else if (setupVisible) {
    // Back while setup/change screen open — return to main view
    document.getElementById('setup-view').classList.add('hidden');
    document.getElementById('main-view').classList.remove('hidden');
  }
  // Always re-push a base state so the app can never be exited by pressing back
  history.pushState({ app: true }, '');
});

// --- Swap modal ---
function openSwapModal(sunISO) {
  // sunISO = Sunday of the week being edited
  const sun = parseISODate(sunISO);
  const existing = state.swaps[sunISO] || null;

  const content = document.getElementById('modal-content');
  const weekEnd = addDays(sun, 6);
  const rangeStr = `${sun.getDate()} ${MONTH_SHORT[sun.getMonth()]} – ${weekEnd.getDate()} ${MONTH_SHORT[weekEnd.getMonth()]}`;

  const mode = existing && existing.duties ? 'duties' : 'position';
  const status = existing ? existing.status : 'pending';
  const withName = existing ? (existing.with || '') : '';
  const note = existing ? (existing.note || '') : '';
  const theirPos = existing && existing.theirPosition ? existing.theirPosition : '';
  const theirGroup = existing && existing.theirGroup ? existing.theirGroup : state.group;
  const duties = existing && existing.duties ? existing.duties : {Sun:'',Mon:'',Tue:'',Wed:'',Thu:'',Fri:'',Sat:''};

  const groupOpts = getVisibleGroups().map(g =>
    `<option value="${g}"${g===theirGroup?' selected':''}>${GROUP_DISPLAY_NAMES[g] || g}</option>`
  ).join('');

  const dutyCells = DAYS.map(day => `
    <div class="wd-cell">
      <div class="wd-label">${day.toUpperCase()}</div>
      <input type="text" inputmode="numeric" data-day="${day}" value="${duties[day] || ''}" placeholder="—" maxlength="4">
    </div>
  `).join('');

  content.innerHTML = `
    <h3>Plan a Swap</h3>
    <div class="mdate">Week of ${rangeStr}</div>

    <div style="background:var(--bg-elev-2);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:12px;">
      <div style="display:flex;align-items:flex-end;gap:10px;">
        <div style="flex:1">
          <label>Week</label>
          <input type="date" id="sw-block-from" value="${sunISO}" style="width:100%">
        </div>
        <button type="button" id="sw-multiweek-btn" style="
          background:var(--bg-elev);border:1px solid var(--line);
          color:var(--text-dim);font-size:12px;font-weight:600;
          padding:9px 12px;border-radius:8px;font-family:inherit;
          cursor:pointer;white-space:nowrap;margin-bottom:1px;
        ">+ More weeks</button>
      </div>
      <div id="sw-multiweek-pane" style="display:none;margin-top:10px;">
        <div>
          <label>Last week of block</label>
          <input type="date" id="sw-block-to" style="width:100%">
        </div>
      </div>
      <div id="sw-block-preview" style="font-size:11px;color:var(--text-dim);margin-top:8px;line-height:1.8;"></div>
    </div>

    <div class="swap-form">
      <div class="field-row">
        <div style="flex:2">
          <label>Swapping with</label>
          <input type="text" id="sw-with" value="${withName.replace(/"/g,'&quot;')}" placeholder="Driver name">
        </div>
        <div style="flex:1">
          <label>Status</label>
          <select id="sw-status">
            <option value="pending"${status==='pending'?' selected':''}>Pending</option>
            <option value="confirmed"${status==='confirmed'?' selected':''}>Confirmed</option>
          </select>
        </div>
      </div>

      <div class="tab-row">
        <button type="button" id="sw-tab-pos" class="${mode==='position'?'active':''}">By position</button>
        <button type="button" id="sw-tab-dut" class="${mode==='duties'?'active':''}">By duty numbers</button>
      </div>

      <div id="sw-pos-pane" class="${mode==='position'?'':'hidden'}">
        <div class="field-row">
          <div style="flex:1">
            <label>Their rotation</label>
            <select id="sw-group">${groupOpts}</select>
          </div>
          <div style="flex:1">
            <label>Their position <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
            <input type="number" inputmode="numeric" id="sw-pos" value="${theirPos}" placeholder="e.g. 73">
          </div>
        </div>
        <div class="edit-sub">The app will show their shifts for that whole week.</div>
      </div>

      <div id="sw-dut-pane" class="${mode==='duties'?'':'hidden'}">
        <label>Duty number for each day (leave blank for off)</label>
        <div class="week-duties">${dutyCells}</div>
      </div>

      <label style="margin-top: 6px">Note (optional)</label>
      <textarea id="sw-note" placeholder="Why you're swapping, what you agreed">${note}</textarea>

      <div style="display: flex; gap: 8px; margin-top: 14px">
        <button class="btn-sm primary" id="sw-save" style="flex:2">Save swap</button>
        ${existing ? '<button class="btn-sm danger" id="sw-delete" style="flex:1">Delete</button>' : ''}
      </div>
    </div>
  `;

  document.getElementById('modal-bg').classList.add('show');
  document.getElementById('modal').classList.add('show');
  if (history.state && history.state.modal) {
    history.replaceState({ modal: true }, '');
  } else {
    history.pushState({ modal: true }, '');
  }
  let currentMode = mode;
  document.getElementById('sw-tab-pos').addEventListener('click', () => {
    currentMode = 'position';
    document.getElementById('sw-tab-pos').classList.add('active');
    document.getElementById('sw-tab-dut').classList.remove('active');
    document.getElementById('sw-pos-pane').classList.remove('hidden');
    document.getElementById('sw-dut-pane').classList.add('hidden');
  });
  document.getElementById('sw-tab-dut').addEventListener('click', () => {
    currentMode = 'duties';
    document.getElementById('sw-tab-dut').classList.add('active');
    document.getElementById('sw-tab-pos').classList.remove('active');
    document.getElementById('sw-dut-pane').classList.remove('hidden');
    document.getElementById('sw-pos-pane').classList.add('hidden');
  });

  // More weeks button
  document.getElementById('sw-multiweek-btn').addEventListener('click', () => {
    const pane = document.getElementById('sw-multiweek-pane');
    const btn = document.getElementById('sw-multiweek-btn');
    const isOpen = pane.style.display !== 'none';
    pane.style.display = isOpen ? 'none' : 'block';
    btn.textContent = isOpen ? '+ More weeks' : '− Less weeks';
    btn.style.color = isOpen ? 'var(--text-dim)' : 'var(--accent-bright)';
    if (isOpen) {
      document.getElementById('sw-block-to').value = '';
      document.getElementById('sw-block-preview').innerHTML = '';
    }
  });

  // Block swap — always visible, auto-detects if to-week is filled
  function getMaxPosition(grp) {
    const g = ROSTER_DATA.rotations[grp];
    if (!g) return 147;
    return Math.max(...g.map(p => p.p));
  }
  function wrapPosition(pos, grp) {
    const max = getMaxPosition(grp);
    if (pos > max) return pos - max;
    if (pos < 1) return max + pos;
    return pos;
  }
  function updateBlockPreview() {
    const fromVal = document.getElementById('sw-block-from').value;
    const toVal = document.getElementById('sw-block-to').value;
    const posVal = parseInt(document.getElementById('sw-pos').value, 10);
    const grp = document.getElementById('sw-group').value;
    const preview = document.getElementById('sw-block-preview');
    if (!toVal) { preview.innerHTML = ''; return; }
    const fromSun = startOfWeek(parseISODate(fromVal));
    const toSun = startOfWeek(parseISODate(toVal));
    if (toSun <= fromSun) { preview.innerHTML = '<span style="color:var(--late)">End week must be after start week</span>'; return; }
    const weeks = [];
    let cur = fromSun;
    let weekPos = posVal || null;
    while (cur <= toSun) {
      const label = `${cur.getDate()} ${MONTH_SHORT[cur.getMonth()]}`;
      const posLabel = weekPos ? ` → P${weekPos}` : '';
      weeks.push(`<span style="color:var(--text)">${label}</span><span style="color:var(--text-dim)">${posLabel}</span>`);
      cur = addDays(cur, 7);
      if (weekPos) weekPos = wrapPosition(weekPos + 1, grp);
    }
    preview.innerHTML = `<strong style="color:var(--accent-bright)">${weeks.length} weeks:</strong> ` + weeks.join(' · ');
  }
  document.getElementById('sw-block-from').addEventListener('change', updateBlockPreview);
  document.getElementById('sw-block-to').addEventListener('change', updateBlockPreview);
  document.getElementById('sw-pos').addEventListener('input', updateBlockPreview);
  document.getElementById('sw-group').addEventListener('change', updateBlockPreview);

  document.getElementById('sw-save').addEventListener('click', () => {
    const withV = document.getElementById('sw-with').value.trim();
    const statusV = document.getElementById('sw-status').value;
    const noteV = document.getElementById('sw-note').value.trim();
    if (!withV) { alert('Enter who you are swapping with.'); return; }
    const swap = { status: statusV, with: withV };
    if (noteV) swap.note = noteV;

    if (currentMode === 'position') {
      const pos = parseInt(document.getElementById('sw-pos').value, 10);
      const grp = document.getElementById('sw-group').value;
      if (pos) {
        const group = ROSTER_DATA.rotations[grp];
        if (!group || !group.find(p => p.p === pos)) {
          alert(`Position ${pos} not found in ${grp}.`); return;
        }
        swap.theirPosition = pos;
        swap.theirGroup = grp;
      }
    } else {
      const duties = {};
      let hasAny = false;
      document.querySelectorAll('#sw-dut-pane input[data-day]').forEach(inp => {
        const day = inp.dataset.day;
        const v = inp.value.trim();
        if (v === '') { duties[day] = null; }
        else { duties[day] = parseInt(v, 10); hasAny = true; }
      });
      if (!hasAny) { alert('Enter at least one duty number.'); return; }
      swap.duties = duties;
    }

    // Block swap if to-week is filled
    const toVal = document.getElementById('sw-block-to').value;
    const fromVal = document.getElementById('sw-block-from').value;
    if (toVal && currentMode === 'position') {
      const fromSun = startOfWeek(parseISODate(fromVal));
      const toSun = startOfWeek(parseISODate(toVal));
      if (toSun <= fromSun) { alert('End week must be after start week.'); return; }
      let cur = fromSun;
      let weekPos = swap.theirPosition || null;
      const grp = swap.theirGroup || state.group;
      while (cur <= toSun) {
        const weekSwap = { ...swap };
        if (weekPos) {
          weekSwap.theirPosition = weekPos;
          weekSwap.theirGroup = grp;
          weekPos = wrapPosition(weekPos + 1, grp);
        }
        state.swaps[fmtISO(cur)] = weekSwap;
        cur = addDays(cur, 7);
      }
    } else {
      state.swaps[sunISO] = swap;
    }
    saveSwaps();
    closeModal();
    renderMain();
  });

  const delBtn = document.getElementById('sw-delete');
  if (delBtn) {
    delBtn.addEventListener('click', () => {
      if (!confirm('Delete this swap?')) return;
      delete state.swaps[sunISO];
      saveSwaps();
      closeModal();
      renderMain();
    });
  }
}

// --- Event wiring ---
document.getElementById('settings-btn').addEventListener('click', () => {
  const setupVisible = !document.getElementById('setup-view').classList.contains('hidden');
  if (setupVisible) {
    // Close settings — same as pressing back
    renderMain();
  } else {
    renderSetup();
  }
});
// 'change' link removed — settings accessible via ⚙ button only

document.getElementById('plan-swap-btn').addEventListener('click', () => {
  const anchor = state.viewWeekAnchor ? parseISODate(state.viewWeekAnchor) : startOfWeek(new Date());
  openSwapModal(fmtISO(startOfWeek(anchor)));
});

// Live Sunday validation on date picker
document.getElementById('setup-start').addEventListener('change', () => {
  const val = document.getElementById('setup-start').value;
  const hint = document.getElementById('sunday-hint');
  const suggest = document.getElementById('sunday-suggest');
  if (!val) { hint.style.display = 'none'; return; }
  const d = parseISODate(val);
  if (d.getDay() === 0) {
    hint.style.display = 'none'; // it's a Sunday, all good
    return;
  }
  // Not a Sunday — find nearest Sunday (go back to most recent Sunday)
  const nearestSun = startOfWeek(d);
  const sunStr = fmtISO(nearestSun);
  const sunLabel = `${DAY_LONG[nearestSun.getDay()]} ${nearestSun.getDate()} ${MONTH_SHORT[nearestSun.getMonth()]} ${nearestSun.getFullYear()}`;
  suggest.textContent = ` Use ${sunLabel} instead`;
  hint.style.display = 'block';
  // Clicking the suggestion auto-corrects the date
  suggest.onclick = () => {
    document.getElementById('setup-start').value = sunStr;
    hint.style.display = 'none';
  };
});

document.getElementById('setup-save').addEventListener('click', () => {
  const group = document.getElementById('setup-group').value;
  const pos = parseInt(document.getElementById('setup-position').value, 10);
  let start = document.getElementById('setup-start').value;
  if (!start) {
    alert('Please enter the roster start date.');
    document.getElementById('setup-start').focus();
    return;
  }
  // Auto-correct to nearest Sunday if they somehow still picked a non-Sunday
  const sd = parseISODate(start);
  if (sd.getDay() !== 0) {
    start = fmtISO(startOfWeek(sd));
    document.getElementById('setup-start').value = start;
  }
  state.group = group;
  state.position = pos;
  state.startDate = start;
  state.viewWeekAnchor = fmtISO(startOfWeek(new Date()));
  saveState();
  renderMain();
});

document.querySelectorAll('.view-toggle button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.currentView = btn.dataset.view;
    renderMain();
  });
});

function navigateTo(direction) {
  if (state.currentView === 'swaps' || state.currentView === 'positions') return;
  const weekView = document.getElementById('week-view');
  const monthView = document.getElementById('month-view');
  const activeView = state.currentView === 'week' ? weekView : monthView;

  // Figure out next state
  const apply = () => {
    if (state.currentView === 'week') {
      const anchor = state.viewWeekAnchor ? parseISODate(state.viewWeekAnchor) : startOfWeek(new Date());
      state.viewWeekAnchor = fmtISO(addDays(anchor, direction === 'next' ? 7 : -7));
    } else {
      const cur = state.viewMonth || { year: new Date().getFullYear(), month: new Date().getMonth() };
      let m = cur.month + (direction === 'next' ? 1 : -1);
      let y = cur.year;
      if (m < 0) { m = 11; y--; }
      if (m > 11) { m = 0; y++; }
      state.viewMonth = { year: y, month: m };
    }
  };

  // Slide out current content, render new, slide in
  const outClass = direction === 'next' ? 'slide-out-left' : 'slide-out-right';
  const inClass = direction === 'next' ? 'slide-in-right' : 'slide-in-left';

  activeView.classList.add(outClass);
  setTimeout(() => {
    activeView.classList.remove(outClass);
    apply();
    renderMain();
    const newActive = state.currentView === 'week' ? weekView : monthView;
    newActive.classList.add(inClass);
    setTimeout(() => newActive.classList.remove(inClass), 180);
  }, 130);
}

document.getElementById('prev-btn').addEventListener('click', () => navigateTo('prev'));
document.getElementById('next-btn').addEventListener('click', () => navigateTo('next'));

document.getElementById('modal-bg').addEventListener('click', closeModal);

// Swipe navigation + modal dismiss
let touchStartX = 0, touchStartY = 0, touchStartModalScroll = 0;
let touchIsDrag = false;

document.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  touchIsDrag = false;
  const modal = document.getElementById('modal');
  touchStartModalScroll = modal.scrollTop;
}, { passive: true });

document.addEventListener('touchmove', (e) => {
  const dy = e.touches[0].clientY - touchStartY;
  const dx = e.touches[0].clientX - touchStartX;
  // Only treat as a drag if moved more than 8px — avoids eating taps
  if (Math.abs(dy) > 8 || Math.abs(dx) > 8) touchIsDrag = true;

  const modal = document.getElementById('modal');
  if (modal.classList.contains('show') && touchIsDrag) {
    // Block pull-to-refresh only when dragging down at top of modal
    if (dy > 0 && modal.scrollTop <= 0) {
      e.preventDefault();
    }
  }
}, { passive: false });

document.addEventListener('touchend', (e) => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  const modal = document.getElementById('modal');

  if (modal.classList.contains('show')) {
    // Swipe down > 80px from top of modal = close (only if it was actually a drag)
    if (touchIsDrag && dy > 80 && touchStartModalScroll <= 0 && Math.abs(dx) < 60) {
      closeModal();
    }
    touchStartX = 0; touchIsDrag = false;
    return;
  }

  // Horizontal swipe for week/month navigation — only on clear drags
  if (!touchStartX || !touchIsDrag) { touchStartX = 0; return; }
  if (Math.abs(dx) > 60 && Math.abs(dy) < 50) {
    if (dx > 0) navigateTo('prev');
    else navigateTo('next');
  }
  touchStartX = 0; touchIsDrag = false;
}, { passive: true });

// Theme management
function applyTheme(light) {
  document.documentElement.setAttribute('data-theme', light ? 'light' : 'dark');
  // Update the browser chrome colour
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.content = light ? '#f2f2f7' : '#0a0a0a';
  localStorage.setItem('roster_theme', light ? 'light' : 'dark');
}

// Wire theme toggle (it's inside the settings view so use event delegation)
document.addEventListener('click', (e) => {
  if (e.target.id === 'theme-toggle') {
    const isLight = document.documentElement.getAttribute('data-theme') === 'light';
    applyTheme(!isLight);
    e.target.classList.toggle('on', !isLight);
  }
});

// Init
loadState();
// Apply saved theme before rendering to avoid flash
const savedTheme = localStorage.getItem('roster_theme');
if (savedTheme === 'light') applyTheme(true);

// Push a base history state so pressing back never exits the app cold
history.replaceState({ app: true }, '');
// Only go to main if the user has actually completed setup
const hasState = state.group && state.position && state.startDate;
if (!hasState) {
  renderSetup(true);
} else {
  if (!state.viewWeekAnchor) state.viewWeekAnchor = fmtISO(startOfWeek(new Date()));
  renderMain();
}

// Register service worker for offline support
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW registered'))
      .catch(err => console.log('SW registration failed (normal for local file):', err));
  });
}
</script>
